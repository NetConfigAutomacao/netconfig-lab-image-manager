events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    # Re-resolve nomes de serviços Docker periodicamente para evitar IP stale
    # quando containers são recriados.
    resolver 127.0.0.11 valid=10s ipv6=on;

    server {
        listen 80;
        listen [::]:80;

        # Sem limite de tamanho de upload
        client_max_body_size 0;

        root /usr/share/nginx/html;

        # Cabeçalhos de segurança (aplicados às páginas/estáticos servidos pelo Nginx).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # 'unsafe-inline' em script-src é necessário por causa do módulo inline
        # que carrega o YAML ESM; demais origens ficam restritas a 'self'.
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; font-src 'self' data:; frame-ancestors 'self'" always;

        location / {
            try_files $uri /index.html;
        }

        location /static/ {
            alias /usr/share/nginx/html/static/;
        }

        location /static/topoviewer/ {
            alias /usr/share/nginx/html/static/topoviewer/;
            types {
                application/javascript js mjs;
                text/css css;
                application/json json;
                image/svg+xml svg;
                font/woff2 woff2;
                font/woff woff;
                font/ttf ttf;
                image/png png;
                image/jpeg jpeg jpg;
            }
            default_type application/octet-stream;
            add_header Cache-Control "no-cache";
        }

        # Proxy para o backend Flask
        location /api/ {
            set $api_upstream "api";
            # Com upstream em variável, o Nginx não faz o "strip" automático
            # de /api/; por isso reescrevemos explicitamente.
            rewrite ^/api/(.*)$ /$1 break;
            # Permite requisições longas (ex.: install de imagens grandes)
            proxy_connect_timeout 300s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;

            proxy_request_buffering off;
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://$api_upstream:8080;
        }
    }
}
